<!DOCTYPE html>
<html>
<head>
<title>Party Wear Collection</title>
<style>
body{
font-family:Poppins,sans-serif;
padding:30px;
text-align:center;
}
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.card{
border:1px solid #ddd;
padding:15px;
border-radius:10px;
}
img{
width:100%;
height:300px;
object-fit:cover;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#faf7f8;
}

header{
    background:#fff;
    padding:15px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 15px rgba(0,0,0,.08);
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:700;
    color:#e91e63;
}

.navbar{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.navbar a{
    text-decoration:none;
    color:#333;
    font-weight:500;
    transition:.3s;
}

.navbar a:hover{
    color:#e91e63;
}

.page-title{
    text-align:center;
    margin:40px 0;
    color:#e91e63;
    font-size:40px;
}

.products{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
}

.card h3{
    padding:15px;
}

.card p{
    padding:0 15px 15px;
    color:#e91e63;
    font-weight:600;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:25px;
    margin-top:50px;
}

@media(max-width:768px){

header{
    flex-direction:column;
    gap:15px;
}

.navbar{
    justify-content:center;
}

.page-title{
    font-size:30px;
}
}
</style>
</head>
<body>
<header>
    <div class="logo">LUXE WOMEN</div>

    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="dresses.html">Dresses</a>
        <a href="partywear.html">Party Wear</a>
        <a href="accessories.html">Accessories</a>
        <a href="footwear.html">Footwear</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<h1>Party Wear Collection</h1>

<div class="products">
<div class="card">
<img src="https://i.pinimg.com/736x/69/a0/a8/69a0a820bd114334082a297133980301.jpg">
<h3>Luxury Evening Gown</h3>
<p>₹4999</p>
</div>

<div class="card">
<img src="https://i.pinimg.com/736x/3f/6f/5c/3f6f5cd0782401e4cdd4e2ff41579c53.jpg">
<h3>Designer Party Wear</h3>
<p>₹3499</p>
</div>

<div class="card">
<img src="https://i.pinimg.com/736x/de/2c/11/de2c11b77ba4dcc2120c5cb636d02783.jpg">
<h3>Cocktail Dress</h3>
<p>₹3999</p>
</div>
</div>
<footer>
    <h3>LUXE WOMEN FASHION</h3>
    <p>Premium Women's Fashion Store</p>
</footer>

</body>
</html>
